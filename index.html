<!DOCTYPE html>

  <head>

    <title>TV Show Project | Joanne (jnnjh)</title>
    <link href="style.css" rel="stylesheet" />

  <body>

    <button id="backBtn">⬅ Back to Shows</button>

    <div id="root"></div>
