<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TV Shows</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <button id="backBtn">⬅ Back to Shows</button>

  <div class="show-search">
    <input id="showSearch" placeholder="Search shows..." />
  </div>

  <div class="episode-search">
    <select id="episode-select">
      <option>Select an episode</option>
    </select>

    <label for="search">Search episode</label>
    <input id="search" placeholder="Search episode" />

    <p id="episodeAmount"></p>
  </div>

  <div class="showAllBtn"></div>

  <div id="root"></div>

  <script src="script.js"></script>
</body>
</html>
